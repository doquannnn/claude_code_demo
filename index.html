<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gomoku</title>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 2rem; background-color: #5a9e8a; color: #ffffff; }
    h1 { margin-bottom: 0.5rem; font-weight: bold; letter-spacing: 0.05em; }
    #status { font-size: 1.2rem; margin: 1rem 0; min-height: 1.5rem; }
    #board { display: grid; grid-template-columns: repeat(18, 38px); grid-template-rows: repeat(18, 38px); gap: 2px; }
    .cell {
      width: 38px; height: 38px;
      background: #ffffff; border: 2px solid #1a1a1a; border-radius: 4px;
      font-size: 1rem; font-weight: bold; cursor: pointer; color: #1a1a1a;
      display: flex; align-items: center; justify-content: center;
    }
    .cell:hover:not([data-taken]) { background: #e8f5f1; }
    .cell[data-taken] { cursor: default; }
    #new-game { margin-top: 1.5rem; padding: 0.6rem 1.4rem; font-size: 1rem; cursor: pointer; background: #1a1a1a; color: #ffffff; border: none; border-radius: 6px; }
  </style>
</head>
<body>
  <h1>Gomoku (5 in a Row)</h1>
  <div id="status"></div>
  <div id="board"></div>
  <button id="new-game">New Game</button>

  <script type="module">
    import { createGame, makeMove, aiMove } from './game.js';

    let state = createGame();
    let aiThinking = false;

    function triggerAI() {
      if (state.winner || state.isDraw || state.currentPlayer !== 'O' || aiThinking) return;
      aiThinking = true;
      setTimeout(() => {
        const idx = aiMove(state.board.slice());
        state = makeMove(state, idx);
        aiThinking = false;
        render();
      }, 100);
    }

    function render() {
      const board = document.getElementById('board');
      const status = document.getElementById('status');
      board.innerHTML = '';
      state.board.forEach((cell, index) => {
        const div = document.createElement('div');
        div.className = 'cell';
        div.textContent = cell ?? '';
        if (cell) div.dataset.taken = '1';
        if (!state.winner && !state.isDraw && !cell && state.currentPlayer === 'X' && !aiThinking) {
          div.addEventListener('click', () => {
            state = makeMove(state, index);
            render();
            triggerAI();
          });
        }
        board.appendChild(div);
      });
      if (state.winner) {
        status.textContent = `Player ${state.winner} wins!`;
      } else if (state.isDraw) {
        status.textContent = "It's a draw!";
      } else if (aiThinking) {
        status.textContent = 'AI is thinking...';
      } else {
        status.textContent = `Player ${state.currentPlayer}'s turn`;
      }
    }

    document.getElementById('new-game').addEventListener('click', () => {
      state = createGame();
      aiThinking = false;
      render();
    });

    render();
  </script>
</body>
</html>
