<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎓 Tic-Tac-Toe</title>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 2rem; background-color: #5a9e8a; color: #ffffff; }
    h1 { margin-bottom: 0.5rem; font-weight: bold; letter-spacing: 0.05em; }
    #status { font-size: 1.2rem; margin: 1rem 0; min-height: 1.5rem; }
    #board { display: grid; grid-template-columns: repeat(18, 44px); grid-template-rows: repeat(18, 44px); gap: 2px; }
    .cell {
      width: 44px; height: 44px;
      background: #ffffff; border: 2px solid #1a1a1a; border-radius: 4px;
      font-size: 1.2rem; font-weight: bold; cursor: pointer; color: #1a1a1a;
      display: flex; align-items: center; justify-content: center;
    }
    .cell:hover:not([data-taken]) { background: #e8f5f1; }
    #new-game { margin-top: 1.5rem; padding: 0.6rem 1.4rem; font-size: 1rem; cursor: pointer; background: #1a1a1a; color: #ffffff; border: none; border-radius: 6px; }
  </style>
</head>
<body>
  <h1>🎓 Tic-Tac-Toe</h1>
  <div id="status"></div>
  <div id="board"></div>
  <button id="new-game">New Game</button>

  <script type="module">
    import { createGame, makeMove } from './game.js';

    let state = createGame();

    function render() {
      const board = document.getElementById('board');
      const status = document.getElementById('status');

      board.innerHTML = '';
      state.board.forEach((cell, index) => {
        const div = document.createElement('div');
        div.className = 'cell';
        div.textContent = cell ?? '';
        if (cell) div.dataset.taken = '1';

        if (!state.winner && !state.isDraw && !cell) {
          div.addEventListener('click', () => {
            state = makeMove(state, index);
            render();
          });
        }

        board.appendChild(div);
      });

      if (state.winner) {
        status.textContent = `Player ${state.winner} wins!`;
      } else if (state.isDraw) {
        status.textContent = "It's a draw!";
      } else {
        status.textContent = `Player ${state.currentPlayer}'s turn`;
      }
    }

    document.getElementById('new-game').addEventListener('click', () => {
      state = createGame();
      render();
    });

    render();
  </script>
</body>
</html>
